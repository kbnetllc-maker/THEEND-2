services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flaxnet
      POSTGRES_PASSWORD: flaxnet
      POSTGRES_DB: flaxnet
    ports:
      - '5432:5432'
    volumes:
      - flaxnet_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U flaxnet -d flaxnet']
      interval: 3s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  flaxnet_pg:
